services:
  hermes:
    build: .
    ports:
      - "4000:4000"
    environment:
      MIX_ENV: dev
      PORT: "4000"
      JWT_SECRET: "CHANGE-ME-in-production-use-openssl-rand-hex-32"
      SECRET_KEY_BASE: "dev-secret-base-that-is-at-least-64-bytes-long-for-phoenix-to-accept-it-ok"
      # Route out of the container network and back to the Mac's localhost where Anansi is exposed
      KAFKA_HOST: host.docker.internal
      KAFKA_PORT: "9092"
