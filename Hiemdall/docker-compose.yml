# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Heimdall — Read State Worker                                      ║
# ║                                                                    ║
# ║  Requires the Anansi network (Kafka broker).                       ║
# ║  Start Anansi first:  docker compose -f Anansi/docker-compose.yml  ║
# ║                       up -d                                        ║
# ╚══════════════════════════════════════════════════════════════════════╝

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  heimdall:
    build: .
    environment:
      REDIS_URL: "redis://redis:6379"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_GROUP_ID: "heimdall-readers"
      KAFKA_TOPIC: "user.activity"
      RUST_LOG: "info"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:

networks:
  default:
    name: anansi
    external: true
