services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: janus
      POSTGRES_PASSWORD: janus_secret
      POSTGRES_DB: janus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U janus"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: janus
      POSTGRES_PASSWORD: janus_secret
      POSTGRES_DB: janus
      SECRET_KEY: dev-only-change-me-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/janus
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
