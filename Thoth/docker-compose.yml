# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Thoth — Message Storage Service                                   ║
# ║                                                                    ║
# ║  Requires the Anansi network (Kafka broker).                       ║
# ║  Start Anansi first:  docker compose -f Anansi/docker-compose.yml  ║
# ║                       up -d                                        ║
# ╚══════════════════════════════════════════════════════════════════════╝

services:
  scylla:
    image: scylladb/scylla:5.4
    command: --smp 1 --memory 512M --overprovisioned 1
    ports:
      - "9042:9042"
    volumes:
      - scylla_data:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 10s
      timeout: 5s
      retries: 10

  thoth:
    build: .
    environment:
      SCYLLA_NODES: "scylla:9042"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_GROUP_ID: "thoth-writers"
      KAFKA_TOPIC: "chat.messages"
      WORKER_ID: "0"
      RUST_LOG: "info"
    depends_on:
      scylla:
        condition: service_healthy

volumes:
  scylla_data:

networks:
  default:
    name: anansi
    external: true
